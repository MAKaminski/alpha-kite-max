# alpha-kite-v2 — Buy Volatility on QQQ Crosses
# Defaults are safe: yfinance feed (delayed/free), paper broker, dry_run=true.
# Flip data.feed to ibkr_live and dry_run to false only after Phase 2 backtest passes.

data:
  feed: yfinance              # yfinance | ibkr_delayed | replay | synthetic_options | ibkr_live
  bar_interval_seconds: 60
  options_feed: synthetic     # synthetic | ibkr_live
  # replay_path: ./tests/fixtures/qqq_2026-04-15_1min.json  # required iff feed == replay

broker:
  name: ibkr
  mode: paper                 # 'live' is hard-blocked in v1
  host: 127.0.0.1
  port: 7497
  client_id: 17
  dry_run: true               # log OrderIntent only; never call placeOrder
  paper_account_allowlist: ["DEMO", "PAPER"]

universe:
  symbol: QQQ

signal:
  name: sma_vwap_cross           # sma_vwap_cross | sma_vwap_cross_tick | sell_put_qqq_cross
  params:
    sma_period: 9
    vwap_session: regular
    # Tick-strategy params (ignored unless name=*_tick or sell_put_qqq_cross)
    sma_window_seconds: 9
    confirmation_seconds: 5
    cooldown_seconds: 30          # used by sell_put_qqq_cross only

# Example: short-put strategy with the user's tiered scale-out ladder.
# Uncomment + set signal.name above to enable.
#
# exit:
#   profit_target_pct: 30        # ignored by sell_put_qqq_cross
#   stop_loss_pct: 25            # ignored by sell_put_qqq_cross
#   time_stop_minutes_before_close: 30
#   entry_delay_minutes_after_open: 10
#   tiers:
#     stop_loss_multiple: 2.0    # close all when option mid >= 2.0 * entry
#     take_profit_tiers:
#       - { gain_pct: 25,  qty_fraction: 0.25 }
#       - { gain_pct: 50,  qty_fraction: 0.25 }
#       - { gain_pct: 100, qty_fraction: 0.25 }
#       # remaining 0.25 of the original qty runs to session close

entry:
  strategy: long_vol
  mode: directional           # directional | straddle
  dte: 0
  contracts: 1
  max_premium_pct_nav: 0.5

exit:
  profit_target_pct: 30
  stop_loss_pct: 25
  time_stop_minutes_before_close: 30
  entry_delay_minutes_after_open: 10  # no entries in the first 10 min after open

risk:
  max_open_positions: 1
  daily_loss_limit_usd: 50
  kill_switch_file: ./KILL
